version: '3.8'

# BabyClaw Slim Version - No Browser Support
# This version excludes Chromium and GUI components for a smaller footprint.
# Recommended for: Chat, knowledge base, file operations, scheduled tasks
# Not suitable for: Browser automation, web scraping, visible browser
#
# Memory: ~512MB - 2GB
# Image Size: ~800MB - 1.5GB

volumes:
  babyclaw-data:
    name: babyclaw-data
  babyclaw-secrets:
    name: babyclaw-secrets

services:
  babyclaw:
    image: agentscope/babyclaw:latest-slim
    container_name: babyclaw
    restart: always
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      # Authentication (optional)
      # - COPAW_AUTH_ENABLED=true
      # - COPAW_AUTH_USERNAME=admin
      # - COPAW_AUTH_PASSWORD=yourpassword

      # Disable browser-related channels (already disabled by default in slim)
      - COPAW_DISABLED_CHANNELS=imessage

      # Resource limits
      - PYTHONUNBUFFERED=1
    volumes:
      - babyclaw-data:/app/working
      - babyclaw-secrets:/app/working.secret
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
