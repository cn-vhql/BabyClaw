# Dangerous Shell Command Detection Rules
# =========================================================================
# Regex-signature rules for RuleBasedToolGuardian.
# Scans execute_shell_command parameters for destructive, evasive,
# or privilege-escalating patterns before the agent executes them.
#
# Severity tiers: MEDIUM = broad catch-all (typically requires user review/confirmation),
#                 HIGH / CRITICAL = targeted destructive patterns (mark result as unsafe; blocking/approval is
#                                   enforced by the surrounding ToolGuard/approval workflow when available).
# See GuardThreatCategory for the full threat taxonomy.

# ── rm: file / directory removal ──────────────────────────────────────
- id: TOOL_CMD_DANGEROUS_RM
  tools: [execute_shell_command]
  params: [command]
  category: command_injection
  severity: HIGH
  patterns:
    - "\\brm\\b"
  description: "Shell command contains 'rm' which may cause data loss"
  remediation: "Confirm with the user before removing files or directories"

# ── mv: file / directory move / rename ────────────────────────────────
- id: TOOL_CMD_DANGEROUS_MV
  tools: [execute_shell_command]
  params: [command]
  category: command_injection
  severity: HIGH
  patterns:
    - "\\bmv\\b"
  description: "Shell command contains 'mv' which may move or overwrite files unexpectedly"
  remediation: "Confirm with the user before moving or renaming files"

# ── Filesystem & Block Device Destruction ─────────────────────────────
- id: TOOL_CMD_FS_DESTRUCTION
  tools: [execute_shell_command]
  params: [command]
  category: command_injection
  severity: CRITICAL
  patterns:
    - "\\bmkfs(\\.[a-zA-Z0-9_]+)?\\b"
    - "\\bmke2fs\\b"
    - "\\bdd\\s+.*of=\\/dev\\/"
    - ">\\s*\\/dev\\/(sd[a-z][0-9]*|vd[a-z][0-9]*|nvme\\d+n\\d+(p\\d+)?)"
  description: "Detects low-level disk formatting or wiping commands"
  remediation: "Block operation. Agents should not format or overwrite raw block devices."

# ── Denial of Service & Fork Bombs ────────────────────────────────────
- id: TOOL_CMD_DOS_FORK_BOMB
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: CRITICAL
  patterns:
    - ":\\s*\\(\\s*\\)\\s*\\{\\s*:\\s*\\|\\s*:\\s*&\\s*\\}\\s*;\\s*:"
    - "\\bkill\\s+-9\\s+(-1\\b|1\\b)"
  description: "Detects classic Bash fork bombs and mass process termination"
  remediation: "Block immediately. These commands will crash the host system."

# ── Network Loaders (Pipe to Shell) ───────────────────────────────────
- id: TOOL_CMD_PIPE_TO_SHELL
  tools: [execute_shell_command]
  params: [command]
  category: code_execution
  severity: CRITICAL
  patterns:
    - "\\b(curl|wget)\\b\\s+.*\\|.*\\b(bash|sh|zsh|ash|dash)\\b"
  description: "Detects 'curl | bash' patterns used to download and immediately execute remote payloads"
  remediation: "Confirm with user. Agents should inspect scripts before executing them."

# ── Reverse Shell & Network Tunnels ───────────────────────────────────
- id: TOOL_CMD_REVERSE_SHELL
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: CRITICAL
  patterns:
    - "\\/dev\\/(tcp|udp)\\/"
    - "\\bnc\\s+.*-e\\s*\\S+"
    - "\\bncat\\s+.*-e\\s*\\S+"
    - "\\bsocat\\s+.*EXEC:"
  description: "Detects attempts to establish reverse shells or unauthorized network tunnels"
  remediation: "Block operation. Agents do not need to bind interactive shells to network sockets."

# ── Persistence & Privilege Escalation ────────────────────────────────
- id: TOOL_CMD_SYSTEM_TAMPERING
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: HIGH
  patterns:
    - "\\bcrontab\\b"
    - "\\bauthorized_keys\\b"
    - "\\/etc\\/sudoers"
    - "\\/etc\\/crontab"
  description: "Detects access to cron jobs, SSH keys, or sudo permissions (including reads and modifications)"
  remediation: "Confirm with user. Treat any access to credential and scheduling files as sensitive and restrict when possible."

# ── Dangerous Permission Changes ──────────────────────────────────────
- id: TOOL_CMD_UNSAFE_PERMISSIONS
  tools: [execute_shell_command]
  params: [command]
  category: privilege_escalation
  severity: HIGH
  patterns:
    - "\\bchmod\\s+-[a-zA-Z]*R[a-zA-Z]*\\s+(777|a\\+rwx)\\s+\\/"
    - "\\bchattr\\s+\\+i"
  description: "Detects global permission downgrades (chmod 777) or setting immutable flags"
  remediation: "Prompt for confirmation. Suggest least-privilege permission models."

# ── Obfuscation & Defense Evasion ─────────────────────────────────────
- id: TOOL_CMD_OBFUSCATED_EXEC
  tools: [execute_shell_command]
  params: [command]
  category: code_execution
  severity: HIGH
  patterns:
    - "\\bbase64\\s+(-d|--decode)\\s*\\|\\s*\\b(bash|sh|zsh)\\b"
  description: "Detects execution of base64 encoded strings passed directly to a shell interpreter"
  remediation: "Block execution. Agents should use plain text commands."

# ── System Power & Reboot ───────────────────────────────────────────────
- id: TOOL_CMD_SYSTEM_REBOOT
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: HIGH
  patterns:
    - "\\b(shutdown|reboot|poweroff|halt)\\b.*(-h\\s+now|-r\\s+now|now)"
    - "\\bsystemctl\\s+(poweroff|reboot|halt)"
    - "\\binit\\s+0"
    - "\\btelinit\\s+0"
  description: "Detects system shutdown, reboot, or halt commands"
  remediation: "Confirm with user. These commands will immediately interrupt system availability."

# ── User & Group Management ───────────────────────────────────────────────
- id: TOOL_CMD_USER_MANAGEMENT
  tools: [execute_shell_command]
  params: [command]
  category: privilege_escalation
  severity: HIGH
  patterns:
    - "\\b(userdel|groupdel)\\b"
    - "\\bpasswd\\b"
    - "\\busermod\\b.*(-aG|-G|-aG|-G)"
    - "\\bgpasswd\\b"
    - "\\bchage\\b"
  description: "Detects user deletion, password changes, or group modifications"
  remediation: "Confirm with user. User and credential management requires explicit approval."

# ── Privilege Escalation ───────────────────────────────────────────────────
- id: TOOL_CMD_PRIVILEGE_ESCALATION
  tools: [execute_shell_command]
  params: [command]
  category: privilege_escalation
  severity: HIGH
  patterns:
    - "\\b(su\\s+-|sudo\\s+(-i|su|-u\\s+root))"
    - "\\bsudo\\s+.*\\b(visudo|vi|nano|vim)\\s+/etc/(sudoers|passwd|shadow)"
    - "\\bpolkit\\b.*add-action"
  description: "Detects privilege escalation attempts or sudoers file modifications"
  remediation: "Block or require explicit user confirmation for privilege elevation."

# ── Process Management ───────────────────────────────────────────────────
- id: TOOL_CMD_PROCESS_KILL
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: MEDIUM
  patterns:
    - "\\b(killall|pkill)\\b.*(-9|KILL|TERM)"
    - "\\bsystemctl\\s+(stop|kill|restart|reload)"
    - "\\bservice\\s+.+(stop|kill|restart)"
  description: "Detects mass process termination or service stoppage"
  remediation: "Confirm with user before terminating processes or stopping services."

# ── Firewall & Network Configuration ───────────────────────────────────
- id: TOOL_CMD_FIREWALL_MODIFICATION
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: HIGH
  patterns:
    - "\\b(iptables|ip6tables)\\s+.*(-F|--flush)"
    - "\\bufw\\s+(disable|reset)"
    - "\\bfirewall-cmd\\s+.*--remove-port"
    - "\\biptables\\s+.*-P\\s+DROP"
  description: "Detects firewall rule flushing or disabling security protections"
  remediation: "Confirm with user. Firewall changes may expose the system to attacks."

# ── Data Wiping & File Overwrite ──────────────────────────────────────────
- id: TOOL_CMD_FILE_WIPE
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: CRITICAL
  patterns:
    - "\\bdd\\s+.*if=\\/dev\\/(zero|random|urandom)\\s+of="
    - "\\bshred\\s+.*(-u|-z|-n\\s+0)"
    - "\\bwipe\\s+.*(-s quick|-s zero)"
    - "\\bsrm\\b"
  description: "Detects disk wiping, secure deletion, or data destruction commands"
  remediation: "Block operation. These commands cause irreversible data loss."

# ── File Content Overwrite ───────────────────────────────────────────────
- id: TOOL_CMD_FILE_OVERWRITE
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: HIGH
  patterns:
    - ">\\s*\\/dev\\/null"
    - ":\\s*>\\s*\\/.*\\.(conf|config|json|yaml|yml|xml|env)"
    - "\\bcat\\s+.*>\\s*\\/.*\\.(conf|config|json|yaml|yml|xml|env)"
    - "\\becho\\s+.*>\\s*\\/.*\\.(conf|config|json|yaml|yml|xml|env)"
  description: "Detects configuration file overwrite or truncation"
  remediation: "Confirm with user before overwriting critical configuration files."

# ── Package Management ────────────────────────────────────────────────────
- id: TOOL_CMD_PACKAGE_INSTALL
  tools: [execute_shell_command]
  params: [command]
  category: code_execution
  severity: MEDIUM
  patterns:
    - "\\b(apt-get|apt|yum|dnf|pacman|zypper)\\s+.*install"
    - "\\bpip\\s+install"
    - "\\bnpm\\s+(install|g\\s+install)"
    - "\\bcurl\\s+.*\\|.*\\b(bash|sh|python|node)\\b"
    - "\\bwget\\s+.*\\|.*\\b(bash|sh|python|node)\\b"
  description: "Detects package installation or remote script execution"
  remediation: "Confirm with user before installing packages or executing remote code."

# ── System Configuration Modification ───────────────────────────────────
- id: TOOL_CMD_SYSTEM_CONFIG
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: HIGH
  patterns:
    - "\\bsysctl\\s+.*-w"
    - "\\becho\\s+.*>\\s*/proc/sys/"
    - "\\bmodprobe\\s+( -r|-v)"
  description: "Detects kernel parameter modifications or module unloading"
  remediation: "Confirm with user. Kernel changes can affect system stability and security."

# ── SSH & Remote Access ───────────────────────────────────────────────────
- id: TOOL_CMD_SSH_CONFIG
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: HIGH
  patterns:
    - "\\bsshd\\b.*(-D\\s+|PermitRootLogin)"
    - "\\bcp\\s+.*\\/etc\\/ssh\\/sshd_config"
    - "\\bsed\\s+.*\\/etc\\/ssh\\/sshd_config"
    - "\\bvi?m?\\s+.*\\/etc\\/ssh\\/sshd_config"
  description: "Detects SSH daemon configuration modifications"
  remediation: "Block or require explicit approval. SSH changes affect remote access security."

# ── History & Log Clearing ────────────────────────────────────────────────
- id: TOOL_CMD_LOG_CLEARING
  tools: [execute_shell_command]
  params: [command]
  category: evidence_destruction
  severity: MEDIUM
  patterns:
    - "\\b(history\\s+-c|unset\\s+HISTFILE)"
    - "\\brm\\s+.*\\.(bash_history|zsh_history|history)"
    - "\\btruncate\\s+.*\\.(log|history)"
    - "\\b>\\s+.*\\.(log|history)"
    - "\\bjournalctl\\s+.*--rotate"
  description: "Detects attempts to clear command history or log files"
  remediation: "Alert user. Log clearing may indicate suspicious activity."

# ── Kernel & Init System ─────────────────────────────────────────────────
- id: TOOL_CMD_KERNEL_MODIFICATION
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: CRITICAL
  patterns:
    - "\\b(insmod|rmmod|modprobe)\\s+.*(-f|--force)"
    - "\\bekernel\\s+.*panic"
    - "\\bsystemctl\\s+.*default"
    - "\\bln\\s+-sf.*(/bin/|/sbin/)"
  description: "Detects forced kernel module operations or init system changes"
  remediation: "Block operation. These can crash or destabilize the system."

# ── Database Destruction ────────────────────────────────────────────────
- id: TOOL_CMD_DATABASE_DROP
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: CRITICAL
  patterns:
    - "\\b(mysql|psql|mongo|redis-cli)\\s+.*\\b(DROP|TRUNCATE|DELETE\\s+FROM)\\b"
    - "\\brm\\s+.*\\/(var/lib/mysql|var/lib/postgresql|var/lib/redis)"
  description: "Detects database dropping, truncation, or data directory removal"
  remediation: "Block operation. Database data loss is irreversible without backups."

# ── Network Scanning & Attack Tools ────────────────────────────────────
- id: TOOL_CMD_NETWORK_ATTACK
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: HIGH
  patterns:
    - "\\b(nmap|masscan|zmap)\\s+.*(-sS|-p-)"
    - "\\bhping3?\\s+.*flood"
    - "\\bslowhttptest\\b"
    - "\\b(metasploit|msfconsole|msfvenom)\\b"
    - "\\b(sqlmap)\\b"
  description: "Detects network scanning tools, DoS attacks, or penetration testing tools"
  remediation: "Block or require explicit approval. Network attacks may be illegal."

# ── Symbolic Link & Device File Creation ─────────────────────────────
- id: TOOL_CMD_LINK_CREATION
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: HIGH
  patterns:
    - "\\bln\\s+-s.*\\/(etc/passwd|etc/shadow|etc/sudoers)"
    - "\\blink\\s+.*\\/(etc/passwd|etc/shadow|etc/sudoers)"
    - "\\bmknod\\s+.*\\s+\\/(dev/sd|dev/vd|dev/nvme)"
  description: "Detects creation of device files or symlinks to critical system files"
  remediation: "Block operation. These can be used for privilege escalation or data theft."

# ── Archive & Compression Operations ────────────────────────────────────
- id: TOOL_CMD_ARCHIVE_EXTRACTION
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: MEDIUM
  patterns:
    - "\\b(tar\\s+.*-xf|unzip|gunzip|bunzip2)\\s+.*\\.tar\\.(gz|bz2|xz)"
    - "\\b7z\\s+x.*\\.(zip|rar|tar|7z)"
    - "\\bunzip\\s+.*\\.zip"
  description: "Detects archive extraction which may overwrite existing files"
  remediation: "Confirm with user. Extracting archives may overwrite files without warning."

# ── Backup & Restore ────────────────────────────────────────────────────
- id: TOOL_CMD_BACKUP_RESTORE
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: MEDIUM
  patterns:
    - "\\b(rsync|scp|cp)\\s+.*-a(--delete|--del)"
    - "\\bmv\\s+.*\\/.*\\/\\.\\."
    - "\\brm\\s+.*\\/-rf"
  description: "Detects backup operations that may delete source data or mirror deletions"
  remediation: "Confirm with user. Backup operations with deletion flags can cause data loss."

# ── Container & Orchestration ────────────────────────────────────────────
- id: TOOL_CMD_CONTAINER_DANGER
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: HIGH
  patterns:
    - "\\bdocker\\s+(rm|stop|kill|pause)\\s+(-f|.*--force)"
    - "\\bdocker\\s+system\\s+(prune|prune -a)"
    - "\\bkubectl\\s+(delete|drain|cordon)\\s+.*--all"
    - "\\bdocker\\s+rmi\\s+-f"
    - "\\brm\\s+-rf\\s+.*\\/var\\/lib\\/docker"
  description: "Detects container deletion, image removal, or Docker data cleanup"
  remediation: "Confirm with user. Container operations can terminate critical workloads."

# ── Certificate & Key Management ────────────────────────────────────────
- id: TOOL_CMD_KEY_ACCESS
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: HIGH
  patterns:
    - "\\bcat\\s+.*\\/(\\.ssh\\/id_rsa|\\.ssh\\/id_ed25519|\\.ssh\\/id_ecdsa)"
    - "\\bssh-keygen\\s+-p.*\\/(id_rsa|id_ed25519|id_ecdsa)"
    - "\\bopenssl\\s+(rsa|pkey|dgst)\\s+-in.*\\/(\\.ssh|private)"
    - "\\bchmod\\s+600.*\\/(\\.ssh|.*private)"
  description: "Detects access to SSH private keys or generation of new key pairs"
  remediation: "Block access. Private keys must never be exposed or logged."

# ── System Information Disclosure ────────────────────────────────────────
- id: TOOL_CMD_INFO_DISCLOSURE
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: MEDIUM
  patterns:
    - "\\bcat\\s+.*\\/(etc/passwd|etc/shadow|etc/gshadow)"
    - "\\bgetent\\s+(passwd|shadow|group)"
    - "\\benv\\s+\\|\\s+grep\\s+-i\\s+(pass|key|secret|token)"
    - "\\bps\\s+aux.*\\b(grep|egrep)\\s+(pass|key|secret|token)"
  description: "Detects attempts to read sensitive system files or extract credentials"
  remediation: "Block or alert. Reading credential files may indicate reconnaissance."

# ── Scheduled Jobs & Init Scripts ──────────────────────────────────────
- id: TOOL_CMD_PERSISTENCE
  tools: [execute_shell_command]
  params: [command]
  category: persistence
  severity: HIGH
  patterns:
    - "\\becho\\s+.*\\|\\s*crontab\\s+-"
    - "\\b(crontab\\s+-e|at\\s+)"
    - "\\bln\\s+-sf.*\\/(etc\\/rc\\.d\\/init\\.d|systemd\\/system)"
    - "\\bupdate-rc\\.d\\s+(defaults|disable|enable)"
  description: "Detects creation of scheduled tasks or init script modifications"
  remediation: "Block or require approval. Persistence mechanisms are common attack vectors."

# ── System Monitoring Interference ─────────────────────────────────────
- id: TOOL_CMD_MONITORING_TAMPERING
  tools: [execute_shell_command]
  params: [command]
  category: evidence_destruction
  severity: MEDIUM
  patterns:
    - "\\bkillall\\s+.+(auditd|rsyslog|syslog-ng|auditd)"
    - "\\brm\\s+.*\\/(var\\/log\\/audit|var\\/run\\/utmp)"
    - "\\bsetenforce\\s+1"
    - "\\bapparmor_parser\\s+.*-R"
  description: "Detects attempts to disable auditing, logging, or security policies"
  remediation: "Block operation. Disabling security monitoring is highly suspicious."

# ── Package Repository Modification ────────────────────────────────────
- id: TOOL_CMD_REPO_MODIFICATION
  tools: [execute_shell_command]
  params: [command]
  category: code_execution
  severity: HIGH
  patterns:
    - "\\bapt\\s+(add-repository|key\\s+adv)"
    - "\\brpm\\s+(--import|--importkeys|-Uvh.*\\.rpm)"
    - "\\byum\\s+(--import|--enablerepo|install.*\\.rpm)"
    - "\\becho\\s+.*>\\s*/etc\\/apt\\/sources\\.list\\.d"
  description: "Detects addition of third-party repositories or package imports"
  remediation: "Confirm with user. Untrusted repos may contain malicious packages."

# ── Data Exfiltration ───────────────────────────────────────────────────
- id: TOOL_CMD_DATA_EXFILTRATION
  tools: [execute_shell_command]
  params: [command]
  category: data_exfiltration
  severity: HIGH
  patterns:
    - "\\bnc\\s+.*-l\\s+\\d+.*</dev/"
    - "\\bbind\\s+.*\\/(dev/|lo:)"
    - "\\bsocat\\s+.*TCP-L:"
    - "\\b(curl|wget)\\s+.*--upload"
    - "\\bftp\\s+(put|mput)"
  description: "Detects file transfers to external systems or network listeners"
  remediation: "Block operation. Data exfiltration indicates potential data theft."

# ── Hard Disk Operations ───────────────────────────────────────────────────
- id: TOOL_CMD_DISK_OPS
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: CRITICAL
  patterns:
    - "\\b(fdisk|parted|gdisk)\\s+.*(w|wipe|mklabel)"
    - "\\bpartprobe\\s+.*--wipe"
    - "\\brm\\s+.*\\/(dev\\/sd|dev\\/vd|dev\\/nvme)"
    - "\\bblkdiscard\\s+.*-f"
  description: "Detects disk partitioning, wiping, or raw device operations"
  remediation: "Block operation. These commands can destroy all data on a disk."

# ── Text Editor in Scripts ───────────────────────────────────────────────
- id: TOOL_CMD_EDITOR_SCRIPTING
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: MEDIUM
  patterns:
    - "\\b(vi|vim|nano|emacs|ed)\\s+.*\\/(etc\\/|usr\\/bin\\/|usr\\/sbin\\/|usr\\/local\\/bin\\/)"
    - "\\bsed\\s+.*-i.*\\/(etc\\/|usr\\/bin\\/|usr\\/sbin\\/)"
    - "\\bawk\\s+.*\\{print\\s+.*system\\(\\)"
  description: "Detects use of interactive editors or sed/awk backdoors in scripts"
  remediation: "Review command. Interactive editors in scripts may hang or corrupt files."

# ── Password Hashing & Encryption ────────────────────────────────────────
- id: TOOL_CMD_ENCRYPTION
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: MEDIUM
  patterns:
    - "\\b(mkpasswd|openssl\\s+passwd)\\s+"
    - "\\bpython\\s+.*\\bcrypt\\.hashpw|crypt\\.crypt"
    - "\\bperl\\s+.*crypt.*\\("
  description: "Detects password hashing or encryption operations"
  remediation: "Monitor operation. Legitimate use is rare in normal automation."

# ── Service Account Manipulation ────────────────────────────────────────
- id: TOOL_CMD_SERVICE_ACCOUNT
  tools: [execute_shell_command]
  params: [command]
  category: privilege_escalation
  severity: HIGH
  patterns:
    - "\\buseradd\\s+.*-u\\s+0"
    - "\\bedit\\s+.*\\/(etc\\/passwd|etc\\/shadow|etc\\/group)"
    - "\\bnewusers\\s+.*-m\\s+0"
    - "\\badduser\\s+.*--uid\\s+0"
  description: "Detects creation of root-equivalent accounts or direct file edits"
  remediation: "Block operation. Creating UID 0 users bypasses standard access controls."

# ── Resource Exhaustion ───────────────────────────────────────────────────
- id: TOOL_CMD_RESOURCE_EXHAUSTION
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: HIGH
  patterns:
    - "\\bwhile\\s+true.*do.*(dd\\s+if=\\/dev\\/zero|:>\\/dev\\/null)"
    - "\\bfork\\s+.*\\bwhile\\s+true"
    - "\\bcat\\s+\\/dev\\/urandom\\s+.*\\|\\s*gzip"
    - "\\byes\\s+.*\\|\\s*(bzip2|xz|gzip)"
  description: "Detects resource exhaustion attacks (CPU, disk, memory)"
  remediation: "Block operation. These commands will degrade or crash the system."

# ── Web Shell Upload ──────────────────────────────────────────────────────
- id: TOOL_CMD_WEB_SHELL
  tools: [execute_shell_command]
  params: [command]
  category: code_execution
  severity: CRITICAL
  patterns:
    - "\\becho\\s+.*\\>\\s*\\.(php|jsp|asp|aspx|sh)"
    - "\\bprintf\\s+.*\\>\\s*\\.(php|jsp|asp|aspx|sh)"
    - "\\bbase64\\s+.*-d\\s*\\|\\s*(dd\\s+of=|printf)"
    - "\\bwget\\s+.*-O\\s+\\/(var\\/www|/srv\\/http|/home\\/.*public_html)"
  description: "Detects web shell upload or backdoor installation"
  remediation: "Block immediately. Web shells allow remote code execution."

# ── File Permission Manipulation ────────────────────────────────────────
- id: TOOL_CMD_PERMISSIONS
  tools: [execute_shell_command]
  params: [command]
  category: privilege_escalation
  severity: MEDIUM
  patterns:
    - "\\bchmod\\s+000\\s+/"
    - "\\bchown\\s+(root|0:0)\\s+.*\\/(usr\\/bin|usr\\/sbin|\\/bin|\\/sbin)"
    - "\\bsetfacl\\s+-m\\s+rwx"
    - "\\bchmod\\s+[ug]+s+.*\\/(etc\\/|usr\\/bin|usr\\/sbin)"
  description: "Detects permission changes that could enable privilege escalation"
  remediation: "Confirm with user. Changing binary or config permissions is risky."

# ── Network Interface Configuration ──────────────────────────────────────
- id: TOOL_CMD_NETWORK_CONFIG
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: MEDIUM
  patterns:
    - "\\bifconfig\\s+.*(down|0\\.0\\.0\\.0)"
