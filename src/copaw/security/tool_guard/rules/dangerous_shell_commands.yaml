  patterns:
    - "\\bmv\\s+.*(httpd|sshd|nginx)\\s+.*\\b(httpd|sshd|nginx)_old"
    - "\\bcp\\s+.*(httpd|sshd|nginx)\\s+.*\\/tmp\\/.*(httpd|sshd|nginx)"
    - "\\bexport\\s+HISTFILE=/dev/null"
  description: "Detects binary renaming or history hiding to masquerade processes"
  remediation: "Alert user. Process masquerading hides malicious activity."

# ── Backup Restoration ───────────────────────────────────────────────────
- id: TOOL_CMD_RESTORE
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: HIGH
  patterns:
    - "\\b(tar\\s+x(p|f)\\s+.*\\s*\\|\\s*\\b(tar\\s+x(p|f))"
    - "\\brestore\\s+.*\\/.*\\s+(\\/|\\\\|~\\|home)"
    - "\\brsync\\s+--delete\\s+.*\\s+.*\\/(root|home|etc)"
    - "\\bcrobocopy\\s+.*\\/mir"
  description: "Detects backup restoration or mirroring operations"
  remediation: "Confirm with user. Restoration can overwrite current files."

# ── Boot Configuration ────────────────────────────────────────────────────
- id: TOOL_CMD_BOOT_CONFIG
  tools: [execute_shell_command]
  params: [command]
  category: persistence
  severity: HIGH
  patterns:
    - "\\bupdate-grub\\s+.*\\/etc\\/default\\/grub"
    - "\\bgrub-mkconfig\\s+-o"
    - "\\becho\\s+.*>\\s+\\/etc\\/default\\/grub"
    - "\\bkernel\\s+.*\\/vmlinuz"
  description: "Detects boot loader configuration modifications"
  remediation: "Block or require approval. Boot config changes can prevent system startup."

# ── Domain Name System ────────────────────────────────────────────────
- id: TOOL_CMD_DNS_ATTACK
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: MEDIUM
  patterns:
    - "\\bnslookup\\s+.*\\|\\s*\\b(grep|awk|sed)"
    - "\\bdig\\s+.*\\|\\s*\\b(axfr|dns|ns)"
    - "\\bhost\\s+.*-t\\s+.*(axfr|ns|dns)"
  description: "Detects DNS reconnaissance or zone transfer attempts"
  remediation: "Alert user. DNS reconnaissance is common in attack preparation."

# ── Network Port Scanning ──────────────────────────────────────────────
- id: TOOL_CMD_PORT_SCAN
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: MEDIUM
  patterns:
    - "\\b(nc\\s+-z\\s+-v\\s+.*\\d+"
    - "\\b(nmap|masscan)\\s+.*-p\\s+-"
    - "\\bnetcat\\s+-z\\s+.*\\d+"
  description: "Detects port scanning or network discovery"
  remediation: "Alert user. Port scanning may precede attacks."

# ── Database Connection ───────────────────────────────────────────────────
- id: TOOL_CMD_DATABASE_CONNECTION
  tools: [execute_shell_command]
  params: [command]
  category: data_exfiltration
  severity: MEDIUM
  patterns:
    - "\\b(mysql|psql|redis-cli|mongo)\\s+.*-h.*-P"
    - "\\bpsql\\s+.*-c.*\\\\\"(SELECT|INSERT|UPDATE|DELETE)"
    - "\\bbcp\\s+.*copy.*database"
  description: "Detects direct database connections or queries"
  remediation: "Monitor operation. Direct DB access should be logged and approved."

# ── File Transfer Protocol ────────────────────────────────────────────────
- id: TOOL_CMD_FTP
  tools: [execute_shell_command]
  params: [command]
  category: data_exfiltration
  severity: MEDIUM
  patterns:
    - "\\b(ftp|tftp|sftp|lftp)\\s+.*put\\s+"
    - "\\blftp\\s+.*mput\\s+"
    - "\\bftp\\s+.*get\\s+.*\\/(\\/etc\\/|\\/home\\/|\\/root\\/)"
  description: "Detects file transfers via FTP/TFTP"
  remediation: "Confirm with user. FTP transfers are unencrypted and insecure."

# ── Remote Code Execution ───────────────────────────────────────────────
- id: TOOL_CMD_RCE
  tools: [execute_shell_command]
  params: [command]
  category: code_execution
  severity: CRITICAL
  patterns:
    - "\\b(eval\\s+\\$\\(curl|wget|cat)"
    - "\\b\\$\\(curl|wget)\\s+.*\\|\\s*\\b(bash|sh|python|perl|ruby)"
    - "\\bpowershell\\s+-c\\s+.*\\(curl|wget|iex)"
    - "\\bpython\\s+-c\\s+.*import\\s+requests"
  description: "Detects remote code execution patterns"
  remediation: "Block immediately. RCE is the most critical vulnerability type."

# ── Web Application Firewall ──────────────────────────────────────────────
- id: TOOL_CMD_WAF
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: MEDIUM
  patterns:
    - "\\bmodsecurity\\s+(ctl\\s+--remove|disable)"
    - "\\b(waf\\s+disable|firewall\\s+disable)"
    - "\\baiptables\\s+.*-D\\s+INPUT\\s+-j\\s+DROP"
  description: "Detects disabling of WAF or firewall rules"
  remediation: "Block or alert. Disabling security protections exposes the system."

# ── Intrusion Detection System ────────────────────────────────────────────
- id: TOOL_CMD_IDS
  tools: [execute_shell_command]
  params: [command]
  category: evidence_destruction
  severity: HIGH
  patterns:
    - "\\bkillall\\s+.*-(ossec|fail2ban|snort|suricata)"
    - "\\bservice\\s+(stop|disable|mask)"
    - "\\bjournalctl\\s+.*disable"
  description: "Detects stopping or disabling of IDS/IPS services"
  remediation: "Block or alert. Disabling IDS prevents threat detection."

# ── Security Information Event Management ──────────────────────────────
- id: TOOL_CMD_SIEM
  tools: [execute_shell_command]
  params: [command]
  category: evidence_destruction
  severity: MEDIUM
  patterns:
    - "\\btruncate\\s+.*\\.(log|audit)"
    - "\\brm\\s+.*\\/(var\\/log\\/audit|\\/var\\/log\\/secure)"
    - "\\blogrotate\\s+.*--force"
  description: "Detects forced log rotation or audit log deletion"
  remediation: "Alert user. Audit log destruction destroys forensic evidence."

# ── Privilege Escalation ────────────────────────────────────────────────
- id: TOOL_CMD_ESCALATION
  tools: [execute_shell_command]
  params: [command]
  category: privilege_escalation
  severity: CRITICAL
  patterns:
    - "\\bsudo\\s+.*visudo"
    - "\\bpolkit\\s+.*add-action"
    - "\\busermod\\s+.*-aG\\s+sudo"
    - "\\bgpasswd\\s+.*-a\\s+.*sudo"
    - "\\bchown\\s+root:root"
  description: "Detects privilege escalation attempts"
  remediation: "Block immediately. Privilege escalation is a critical security threat."

# ── Data Destruction ─────────────────────────────────────────────────────
- id: TOOL_CMD_DATA_DESTRUCTION
  tools: [execute_shell_command]
  params: [command]
  category: data_destruction
  severity: CRITICAL
  patterns:
    - "\\bdd\\s+if=/dev\\/zero\\s+of=.*\\s+bs=\\d+"
    - "\\bshred\\s+-u\\s+-z"
    - "\\bwipe\\s+.*-s\\s+zero"
    - "\\brm\\s+-rf\\s+.*\\s+(\\/|\\\\).*\\.(db|sql|mdb)"
  description: "Detects data wiping or destruction commands"
  remediation: "Block immediately. Data destruction is irreversible."

# ── System Shutdown ───────────────────────────────────────────────────────
- id: TOOL_CMD_SHUTDOWN
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: HIGH
  patterns:
    - "\\bshutdown\\s+.*(-h\\s+now|-P\\s+0|poweroff|halt)"
    - "\\breboot\\s+.*(-f|now)"
    - "\\bsystemctl\\s+(poweroff|reboot|halt)"
    - "\\binit\\s+0"
  description: "Detects system shutdown or reboot commands"
  remediation: "Block or require confirmation. System shutdown disrupts availability."

# ── Network Attack Tools ────────────────────────────────────────────────────
- id: TOOL_CMD_NETWORK_ATTACK_TOOLS
  tools: [execute_shell_command]
  params: [command]
  category: network_abuse
  severity: HIGH
  patterns:
    - "\\b(hping3?|nping|masscan)\\s+.*flood"
    - "\\b(slowloris|goldeneye)\\b"
    - "\\b(sqlmap|nmap|metasploit|msfconsole)\\b"
    - "\\b(hydra\\s+.*-L)"
    - "\\bmedusa\\b"
  description: "Detects network attack or penetration testing tools"
  remediation: "Block immediately. Attack tools may be illegal or violate policy."

# ── Security Tool Tampering ───────────────────────────────────────────────
- id: TOOL_CMD_SECURITY_TAMPERING
  tools: [execute_shell_command]
  params: [command]
  category: evidence_destruction
  severity: HIGH
  patterns:
    - "\\bsetenforce\\s+0"
    - "\\bapparmor\\s+.*-d"
    - "\\bselinuxconfigured\\s+0"
    - "\\b(rm\\s+.*\\/etc\\/selinux)"
  description: "Detects disabling or weakening of SELinux or AppArmor"
  remediation: "Block or require approval. Disabling security frameworks is dangerous."

# ── Container Security ───────────────────────────────────────────────────
- id: TOOL_CMD_CONTAINER_SECURITY
  tools: [execute_shell_command]
  params: [command]
  category: resource_abuse
  severity: HIGH
  patterns:
    - "\\bdocker\\s+rm\\s+-f"
    - "\\bdocker\\s+run\\s+.*--privileged"
    - "\\bdocker\\s+run\\s+.*-v\\s+.*:/:/"
    - "\\bkubectl\\s+delete\\s+.*--all"
    - "\\bdocker\\s+system\\s+prune\\s+-a"
  description: "Detects dangerous container operations"
  remediation: "Block or require confirmation. Container operations can be destructive."

# ── Information Disclosure ───────────────────────────────────────────────
- id: TOOL_CMD_INFO_DISCLOSURE
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: MEDIUM
  patterns:
    - "\\bcat\\s+.*\\/(etc\\/passwd|etc\\/shadow|etc\\/group)"
    - "\\bgetent\\s+(passwd|shadow|group|hosts)"
    - "\\benv\\s+\\|\\s+grep\\s+-i\\s+(pass|key|secret|token)"
    - "\\bps\\s+auxe\\s+\\|\\s+grep\\s+(pass|key|secret|token)"
  description: "Detects attempts to read sensitive system information"
  remediation: "Alert user. Information disclosure can aid credential theft."

# ── Persistence ────────────────────────────────────────────────────────
- id: TOOL_CMD_PERSISTENCE
  tools: [execute_shell_command]
  params: [command]
  category: persistence
  severity: HIGH
  patterns:
    - "\\becho\\s+.*\\|\\s*crontab\\s+-"
    - "\\bat\\s+.*\\s+\\~\\/(cron|at|periodic)"
    - "\\bsystemctl\\s+enable\\s+.*\\.(service|timer)"
    - "\\bln\\s+-sf\\s+.*systemd\\/system"
    - "\\bupdate-rc\\.d\\s+.*defaults"
  description: "Detects persistence mechanisms (cron, systemd, init)"
  remediation: "Block or require approval. Persistence maintains attacker access."

# ── Data Exfiltration ───────────────────────────────────────────────────
- id: TOOL_CMD_DATA_EXFILTRATION
  tools: [execute_shell_command]
  params: [command]
  category: data_exfiltration
  severity: HIGH
  patterns:
    - "\\b(nc\\s+.*-l\\s+\\d+.*<.*"
    - "\\bsocat\\s+.*TCP-L:"
    - "\\bftp\\s+.*put\\s+"
    - "\\b(curl|wget|scp)\\s+.*external"
    - "\\bgit\\s+push\\s+.*github.*\\.git"
  description: "Detects data transfer to external systems"
  remediation: "Block or alert. Data exfiltration indicates data theft."

# ── System Monitoring ────────────────────────────────────────────────────
- id: TOOL_CMD_MONITORING
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: LOW
  patterns:
    - "\\b(ps\\s+aux|top\\s+-b\\s+-n\\s+1)"
    - "\\bhtop\\b"
    - "\\biostat\\b"
    - "\\bvmstat\\b"
    - "\\bnetstat\\s+.*-tulpn"
  description: "Detects system monitoring commands"
  remediation: "Allow. Monitoring is usually legitimate system administration."

# ── Debugging Tools ───────────────────────────────────────────────────────
- id: TOOL_CMD_DEBUGGING
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: LOW
  patterns:
    - "\\bstrace\\s+.*-p\\s+\\d+"
    - "\\bgdb\\s+.*attach"
    - "\\bltrace\\s+.*-p\\s+\\d+"
    - "\\b(objdump|nm|readelf)\\s+.*"
  description: "Detects debugging or tracing tools"
  remediation: "Allow with monitoring. Debugging tools are used for troubleshooting."

# ── Network Tools ───────────────────────────────────────────────────────
- id: TOOL_CMD_NETWORK_TOOLS
  tools: [execute_shell_command]
  params: [command]
  category: sensitive_file_access
  severity: LOW
  patterns:
    - "\\bping\\s+.*-c\\s+\\d+"
    - "\\btraceroute\\s+.*-n"
    - "\\bnslookup\\s+.*\\|\\s*head"
    - "\\bnetstat\\s+.*-rn"
    - "\\bss\\s+.*-t\\s+ulpn"
  description: "Detects network diagnostic tools"
  remediation: "Allow. Network tools are used for troubleshooting."