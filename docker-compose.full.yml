# CoPaw Full Docker Compose Configuration
# Full includes Chromium, Xvfb, and XFCE for browser automation.
#
# Start:
#   docker compose -f docker-compose.full.yml up -d --build
#   COPAW_APT_MIRROR=http://mirrors.tuna.tsinghua.edu.cn docker compose -f docker-compose.full.yml up -d --build
#   COPAW_PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple docker compose -f docker-compose.full.yml up -d --build

volumes:
  copaw-data:
    name: copaw-data
  copaw-secrets:
    name: copaw-secrets

services:
  copaw:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        APT_MIRROR: ${COPAW_APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn}
        NPM_REGISTRY: ${COPAW_NPM_REGISTRY:-https://registry.npmmirror.com}
        PNPM_REGISTRY: ${COPAW_PNPM_REGISTRY:-https://registry.npmmirror.com}
        PIP_INDEX_URL: ${COPAW_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${COPAW_PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        UV_DEFAULT_INDEX: ${COPAW_UV_DEFAULT_INDEX:-https://pypi.tuna.tsinghua.edu.cn/simple}
        UV_INDEX_URL: ${COPAW_UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        INCLUDE_BROWSER: "true"
        INSTALL_OLLAMA: ${COPAW_INSTALL_OLLAMA:-false}
        COPAW_DISABLED_CHANNELS: ${COPAW_DISABLED_CHANNELS:-imessage}
    image: ${COPAW_IMAGE_TAG:-copaw:full}
    container_name: ${COPAW_CONTAINER_NAME:-copaw}
    restart: unless-stopped
    ports:
      - "${COPAW_BIND_HOST:-0.0.0.0}:${COPAW_EXTERNAL_PORT:-8088}:8088"
    environment:
      COPAW_WORKING_DIR: /app/working
      COPAW_SECRET_DIR: /app/working.secret
      COPAW_DISABLED_CHANNELS: ${COPAW_DISABLED_CHANNELS:-imessage}
      COPAW_RUNNING_IN_CONTAINER: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      PYTHONUNBUFFERED: "1"
      COPAW_PORT: "8088"
      # Authentication (optional)
      # COPAW_AUTH_ENABLED: "true"
      # COPAW_AUTH_USERNAME: "admin"
      # COPAW_AUTH_PASSWORD: "yourpassword"
    volumes:
      - copaw-data:/app/working
      - copaw-secrets:/app/working.secret
    mem_limit: ${COPAW_MEM_LIMIT:-4g}
    mem_reservation: ${COPAW_MEM_RESERVATION:-2g}
    shm_size: ${COPAW_SHM_SIZE:-2g}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
