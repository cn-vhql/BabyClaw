version: '3.8'

# BabyClaw Full Version - With Browser Support
# This version includes Chromium and GUI components for browser automation.
# Recommended for: All features including web scraping, browser automation, visible browser
# Suitable for: Chat, knowledge base, browser automation, web interactions
#
# Features:
# - Knowledge base with TF-IDF intelligent chunking (requires scikit-learn)
# - Browser automation with Playwright and Chromium
# - Multi-channel support (DingTalk, Feishu, QQ, Discord, etc.)
# - Scheduled tasks and cron jobs
# - File operations (PDF, Office, etc.)
#
# Memory: ~2GB - 4GB
# Image Size: ~1.4GB - 2.1GB

volumes:
  babyclaw-data:
    name: babyclaw-data
  babyclaw-secrets:
    name: babyclaw-secrets

services:
  babyclaw:
    image: agentscope/babyclaw:latest-full
    container_name: babyclaw
    restart: always
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      # Authentication (optional)
      # - COPAW_AUTH_ENABLED=true
      # - COPAW_AUTH_USERNAME=admin
      # - COPAW_AUTH_PASSWORD=yourpassword

      # Channel filtering
      - COPAW_DISABLED_CHANNELS=imessage

      # Resource limits
      - PYTHONUNBUFFERED=1

      # Enable browser support (automatically detected)
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - babyclaw-data:/app/working
      - babyclaw-secrets:/app/working.secret
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Additional shm size for Chromium
    shm_size: 2gb
