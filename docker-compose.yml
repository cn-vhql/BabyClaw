# BabyClaw Default Configuration (Slim Version - No Browser Support)
# This version uses the slim image for smaller footprint.
# For full version with browser support, use docker-compose.full.yml
# For slim version explicitly, use docker-compose.slim.yml
#
# Quick start:
#   docker-compose up -d              # Start slim version (default)
#   docker-compose -f docker-compose.full.yml up -d  # Start full version
#
# Features:
# - Knowledge base with TF-IDF intelligent chunking (requires scikit-learn)
# - Multi-channel support (DingTalk, Feishu, QQ, Discord, etc.)
# - Scheduled tasks and cron jobs
# - File operations (PDF, Office, etc.)
#
# Build: docker build -t babyclaw:slim .
# Memory: ~512MB - 2GB
# Image Size: ~800MB - 1.5GB

volumes:
  babyclaw-data:
    name: babyclaw-data
  babyclaw-secrets:
    name: babyclaw-secrets

services:
  babyclaw:
    image: babyclaw:slim
    container_name: babyclaw
    restart: always
    ports:
      - "0.0.0.0:8088:8088"
    environment:
      # Authentication (optional)
      # - COPAW_AUTH_ENABLED=true
      # - COPAW_AUTH_USERNAME=admin
      # - COPAW_AUTH_PASSWORD=yourpassword

      # Disable iMessage channel (not available in containers)
      - COPAW_DISABLED_CHANNELS=imessage

      # Resource limits
      - PYTHONUNBUFFERED=1
    volumes:
      - babyclaw-data:/app/working
      - babyclaw-secrets:/app/working.secret
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
